name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.sanitizer }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        sanitizer: [OFF]
        include:
          - os: ubuntu-latest
            sanitizer: ASAN_UBSAN
          - os: ubuntu-latest
            sanitizer: TSAN
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DVELOX_SANITIZER=${{ matrix.sanitizer }}

      - name: Build
        run: cmake --build build --config Debug -j

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -C Debug
